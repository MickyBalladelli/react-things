name: Publish npm package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Build package
        run: npm run build:ui

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p "require('./packages/ui/package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./packages/ui/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check published version
        id: published
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version > /dev/null 2>&1
          then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.published.outputs.exists == 'false'
        run: npm publish -w @mickyballadelli/react-things --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip existing version
        if: steps.published.outputs.exists == 'true'
        run: echo "Version ${{ steps.package.outputs.version }} already exists on npm. Skipping publish."
